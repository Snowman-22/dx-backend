name: Deploy Spring Boot to EC2
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create application.yml
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > src/main/resources/application.yml

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Build and Save Docker Image
        run: |
          docker build -t spring_snowman_image .
          docker save spring_snowman_image > spring_snowman.tar

      - name: Clean up old files on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f /home/${{ secrets.EC2_USERNAME }}/spring_snowman.tar
            docker system prune -f

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "spring_snowman.tar"
          target: "/home/${{ secrets.EC2_USERNAME }}"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop spring_snowman || true
            docker rm spring_snowman || true
            docker load < /home/${{ secrets.EC2_USERNAME }}/spring_snowman.tar
            docker run -d -p 8080:8080 --name spring_snowman spring_snowman_image
            rm -f /home/${{ secrets.EC2_USERNAME }}/spring_snowman.tar