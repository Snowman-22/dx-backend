<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STOMP 채팅 테스트 (team2)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="h3 mb-3">STOMP 채팅 테스트</h1>
    <p class="text-muted small">
        Spring 설정: 엔드포인트 <code>/ws</code> (SockJS), 앱 prefix <code>/app</code>, 브로커 <code>/topic</code>.
        <code>CONNECT</code> / <code>SUBSCRIBE</code> / <code>SEND</code> 시 <code>Authorization: Bearer &lt;JWT&gt;</code> 필요합니다.
    </p>

    <div class="card mb-3">
        <div class="card-header">연결</div>
        <div class="card-body">
            <div class="mb-2">
                <label class="form-label">서버 HTTP 베이스 URL (SockJS용, ws 아님)</label>
                <input type="text" id="httpBase" class="form-control" value="http://localhost:8080" placeholder="http://localhost:8080">
            </div>
            <div class="mb-2">
                <label class="form-label">JWT 액세스 토큰</label>
                <input type="password" id="jwtToken" class="form-control" placeholder="Bearer 없이 토큰만 입력">
            </div>
            <button type="button" id="btnConnect" class="btn btn-primary">연결</button>
            <button type="button" id="btnDisconnect" class="btn btn-outline-secondary" disabled>연결 끊기</button>
            <span id="connStatus" class="ms-2 badge bg-secondary">미연결</span>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header">구독</div>
        <div class="card-body">
            <div class="mb-2">
                <label class="form-label">convId (= chatId 숫자 문자열)</label>
                <input type="text" id="convId" class="form-control" value="1" placeholder="예: 101">
            </div>
            <p class="small text-muted mb-2">구독 경로: <code>/topic/chat/{convId}</code></p>
            <button type="button" id="btnSubscribe" class="btn btn-success" disabled>구독</button>
            <button type="button" id="btnUnsubscribe" class="btn btn-outline-danger" disabled>구독 해제</button>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header">메시지 전송 → <code>/app/chat.send</code></div>
        <div class="card-body">
            <div class="row g-2 mb-2">
                <div class="col-md-3">
                    <label class="form-label">stepCode</label>
                    <input type="text" id="stepCode" class="form-control" value="RECO">
                </div>
                <div class="col-md-9">
                    <label class="form-label">assistantText</label>
                    <input type="text" id="assistantText" class="form-control" placeholder="null 가능">
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label">userText (문자열 또는 JSON)</label>
                <textarea id="userText" class="form-control" rows="2" placeholder="사용자 입력 문자열"></textarea>
                <div class="form-check mt-1">
                    <input class="form-check-input" type="checkbox" id="userTextAsJson">
                    <label class="form-check-label" for="userTextAsJson">userText를 JSON으로 파싱해서 보내기 (객체/배열)</label>
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label">전체 편집 (JSON) — convId는 위 입력과 동기화됩니다</label>
                <textarea id="messageJson" class="form-control font-monospace small" rows="8"></textarea>
            </div>
            <button type="button" id="btnSyncJson" class="btn btn-outline-secondary btn-sm">위 필드 → JSON 반영</button>
            <button type="button" id="btnSend" class="btn btn-primary" disabled>전송</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">수신 로그</div>
        <div class="card-body">
            <pre id="logBox" class="border rounded p-2 bg-white" style="height:280px; overflow:auto; font-size:12px; margin:0;"></pre>
            <button type="button" id="btnClearLog" class="btn btn-sm btn-outline-secondary mt-2">로그 지우기</button>
        </div>
    </div>
</div>

<script>
(function () {
    let stompClient = null;
    let subscription = null;

    const $ = (id) => document.getElementById(id);

    function authHeaders() {
        const token = $('jwtToken').value.trim();
        if (!token) return {};
        const bearer = token.startsWith('Bearer ') ? token : 'Bearer ' + token;
        return { Authorization: bearer };
    }

    function logLine(msg, obj) {
        const box = $('logBox');
        const time = new Date().toISOString();
        let line = '[' + time + '] ' + msg;
        if (obj !== undefined) {
            try {
                line += '\n' + (typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2));
            } catch (e) {
                line += '\n' + String(obj);
            }
        }
        box.textContent += line + '\n\n';
        box.scrollTop = box.scrollHeight;
    }

    function setConnected(connected) {
        $('btnConnect').disabled = connected;
        $('btnDisconnect').disabled = !connected;
        $('btnSubscribe').disabled = !connected;
        $('btnUnsubscribe').disabled = !connected || !subscription;
        $('btnSend').disabled = !connected;
        $('connStatus').textContent = connected ? '연결됨' : '미연결';
        $('connStatus').className = 'ms-2 badge ' + (connected ? 'bg-success' : 'bg-secondary');
    }

    function syncMessageJsonFromFields() {
        const convId = $('convId').value.trim();
        const stepCode = $('stepCode').value.trim();
        const assistantText = $('assistantText').value;
        let userText;
        const raw = $('userText').value;
        if ($('userTextAsJson').checked && raw.trim()) {
            try {
                userText = JSON.parse(raw);
            } catch (e) {
                alert('userText JSON 파싱 실패: ' + e.message);
                return;
            }
        } else {
            userText = raw;
        }
        const body = {
            convId: convId,
            stepCode: stepCode || null,
            assistantText: assistantText || null,
            userText: userText
        };
        $('messageJson').value = JSON.stringify(body, null, 2);
    }

    $('btnSyncJson').addEventListener('click', syncMessageJsonFromFields);

    $('btnConnect').addEventListener('click', function () {
        const base = $('httpBase').value.replace(/\/$/, '');
        if (!base) {
            alert('HTTP 베이스 URL을 입력하세요.');
            return;
        }
        const headers = authHeaders();
        if (!headers.Authorization) {
            alert('JWT 토큰을 입력하세요. (서버 STOMP 인증 필요)');
            return;
        }

        const sockUrl = base + '/ws';
        const socket = new SockJS(sockUrl);
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
            headers,
            function () {
                logLine('STOMP CONNECT 성공');
                setConnected(true);
            },
            function (err) {
                logLine('STOMP 오류', err && (err.headers ? err.headers.message : String(err)));
                setConnected(false);
                stompClient = null;
            }
        );
    });

    $('btnDisconnect').addEventListener('click', function () {
        if (subscription) {
            try { subscription.unsubscribe(); } catch (e) {}
            subscription = null;
        }
        if (stompClient) {
            try { stompClient.disconnect(); } catch (e) {}
            stompClient = null;
        }
        logLine('연결 종료');
        setConnected(false);
    });

    $('btnSubscribe').addEventListener('click', function () {
        if (!stompClient || !stompClient.connected) return;
        const convId = $('convId').value.trim();
        if (!convId) {
            alert('convId를 입력하세요.');
            return;
        }
        if (subscription) {
            try { subscription.unsubscribe(); } catch (e) {}
            subscription = null;
        }
        const path = '/topic/chat/' + convId;
        const headers = authHeaders();
        subscription = stompClient.subscribe(path, function (msg) {
            let body = msg.body;
            try { body = JSON.parse(msg.body); } catch (e) {}
            logLine('수신 ' + path, body);
        }, headers);
        logLine('구독: ' + path);
        $('btnUnsubscribe').disabled = false;
    });

    $('btnUnsubscribe').addEventListener('click', function () {
        if (subscription) {
            try { subscription.unsubscribe(); } catch (e) {}
            subscription = null;
            logLine('구독 해제');
        }
        $('btnUnsubscribe').disabled = true;
    });

    $('btnSend').addEventListener('click', function () {
        if (!stompClient || !stompClient.connected) return;
        let payload;
        try {
            payload = JSON.parse($('messageJson').value);
        } catch (e) {
            alert('메시지 JSON이 올바르지 않습니다: ' + e.message);
            return;
        }
        const headers = authHeaders();
        stompClient.send('/app/chat.send', headers, JSON.stringify(payload));
        logLine('전송 /app/chat.send', payload);
    });

    $('btnClearLog').addEventListener('click', function () {
        $('logBox').textContent = '';
    });

    syncMessageJsonFromFields();
    setConnected(false);
})();
</script>
</body>
</html>
